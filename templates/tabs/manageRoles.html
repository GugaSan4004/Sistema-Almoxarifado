<form action="/mails-api/manageRoles" method="post" id="manage_roles_form"
    class="md:p-8 py-8 px-6 bg-white rounded-xl shadow-lg overflow-hidden border-t-4 border-light-default-main row-span-2 md:w-2xl w-5/6 self-center h-max justify-self-center *:w-full">
    <h2 class="text-3xl! font-bold text-center text-light-default-main">Gerenciar Cargos</h2>

    <input type="hidden" name="form_action" id="form_action" value="save">

    <div class="flex items-center justify-center gap-x-3">
        <h1 class="font-bold">Criar</h1>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="mode_toggle" name="mode" class="sr-only peer">
            <div
                class="w-11 h-6 bg-light-default-main peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all">
            </div>
        </label>
        <h1 class="font-bold">Editar</h1>
    </div>

    <div class="my-4 flex flex-col" id="role_input_container">

    </div>

    <div class="mb-4 md:h-[12vmax] overflow-y-auto border border-gray-200 p-3 rounded-md bg-gray-50 flex flex-col">
        <label class="block font-semibold text-gray-600 mb-2">Permissões de Abas</label>
        <div class="grid grid-cols-2" id="permissions_container">
            {% for tab in all_tabs %}
            <label class="flex items-center space-x-2 cursor-pointer">
                <input type="checkbox" name="tabs" value="{{ tab['id'] }}"
                    class="h-4 w-4 text-light-default-main transition duration-150 ease-in-out cursor-pointer tab-checkbox">
                <span class="text-gray-700 select-none">{{ tab['name'] }}</span>
            </label>
            {% endfor %}
        </div>
    </div>

    <input type="hidden" id="csrf-token" value="{{ csrf_token() }}">
    <script id="all-tabs-json" type="application/json">{{ all_tabs | tojson }}</script>
    <script id="roles-data-json" type="application/json">{{ roles_data | tojson }}</script>

    <div class="flex gap-4">
        <button type="button" id="delete_btn" onclick="submitDelete()"
            class="hidden hover:bg-red-700 text-white cursor-pointer rounded-sm h-11 w-1/3 bg-red-600 font-bold py-3 shadow-md transform active:scale-95 transition-all uppercase tracking-wide">
            Excluir
        </button>
        <button type="submit" id="submit_btn"
            class="hover:text-light-default-secondary text-white cursor-pointer rounded-sm h-11 flex-1 bg-light-default-main font-bold py-3 shadow-md transform active:scale-95 transition-all uppercase tracking-wide flex items-center justify-center">
            Enviar Alterações
        </button>
    </div>
</form>
